# GitHub Actions — Android emulator (API 30 / Android 11)
appium.server.url=http://127.0.0.1:4723
platform.name=Android
device.name=emulator-5554
platform.version=11
automation.name=UiAutomator2
app.wait.activity=*

# GitHub-hosted emulators are slow; default 20s adb timeouts are too tight for UiAutomator2 server install
adb.exec.timeout=120000
uiautomator2.server.install.timeout=120000
uiautomator2.server.launch.timeout=120000

sample.app=mda-native
