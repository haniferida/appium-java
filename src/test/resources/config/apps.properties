# Sample app presets — paths are relative to project root (see apps/README.md)
sample.app.default=mda-native

# My Demo App (native)
mda-native.android.app=apps/my-demo-app-native/android.apk
mda-native.android.package=com.saucelabs.mydemoapp.android
mda-native.android.activity=com.saucelabs.mydemoapp.android.view.activities.SplashActivity
mda-native.ios.app=apps/my-demo-app-native/ios-simulator.zip
mda-native.ios.real.app=apps/my-demo-app-native/ios-real.ipa
mda-native.ios.bundle=com.saucelabs.mydemo.app.ios

# My Demo App (React Native)
mda-rn.android.app=apps/my-demo-app-rn/android.apk
mda-rn.android.package=com.saucelabs.mydemoapp.rn
mda-rn.android.activity=com.saucelabs.mydemoapp.rn.MainActivity
mda-rn.ios.app=apps/my-demo-app-rn/ios-simulator.zip
mda-rn.ios.real.app=apps/my-demo-app-rn/ios-real.ipa
mda-rn.ios.bundle=com.saucelabs.mydemoapp.rn

# Swag Labs mobile sample (archived; still useful for tutorials)
swag-labs.android.app=apps/swag-labs/android.apk
swag-labs.android.package=com.swaglabsmobileapp
swag-labs.android.activity=com.swaglabsmobileapp.MainActivity
swag-labs.ios.app=apps/swag-labs/ios-simulator.zip
swag-labs.ios.real.app=apps/swag-labs/ios-real.ipa
swag-labs.ios.bundle=com.saucelabs.SwagLabsMobileApp
