# iOS local simulator — uses My Demo App (native) simulator build from apps/
appium.server.url=http://127.0.0.1:4723
platform.name=iOS
device.name=iPhone 17
platform.version=26.5
automation.name=XCUITest

# Preset: mda-native | mda-rn | swag-labs
sample.app=mda-native

# Simulator .zip is selected automatically via apps.properties (mda-native.ios.app)
# For a physical device, set app.path to the matching ios-real.ipa (requires re-signing)
