name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile main and test sources
        run: mvn -B test-compile

  android-tests:
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Download sample Android app
        run: chmod +x scripts/download-ci-apps.sh && ./scripts/download-ci-apps.sh

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-boot-timeout: 600
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-metrics
          script: |
            set -eu
            npm install -g appium
            appium driver install uiautomator2
            nohup appium --log-level error --port 4723 > appium.log 2>&1 &
            sleep 10
            adb devices
            mvn -B test -Denv=ci -Dplatform=android

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          if-no-files-found: ignore

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload Appium server log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: appium-log
          path: appium.log
          if-no-files-found: ignore
